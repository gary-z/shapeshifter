<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shapeshifter Solver</title>
<style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 30px 20px;
    }

    h1 { text-align: center; color: #e94560; font-size: 2em; margin-bottom: 5px; }
    #status { text-align: center; padding: 8px; font-size: 0.85em; color: #aaa; margin-bottom: 20px; }

    .input-section { margin-bottom: 25px; }
    .input-section label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; }

    textarea {
        width: 100%; height: 80px;
        background: #16213e; color: #e0e0e0;
        border: 1px solid #333; border-radius: 8px;
        padding: 12px;
        font-family: 'Consolas', 'Fira Code', monospace; font-size: 12px;
        resize: vertical; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: #e94560; }

    .btn-row { text-align: center; margin: 20px 0; }

    button#solve-btn {
        background: #e94560; color: #fff; border: none; border-radius: 8px;
        padding: 12px 40px; font-size: 1.1em; font-weight: 600;
        cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button#solve-btn:hover:not(:disabled) { background: #c0392b; transform: translateY(-1px); }
    button#solve-btn:disabled { background: #555; cursor: not-allowed; }

    .results-section {
        background: #16213e; border-radius: 10px;
        padding: 20px; margin-top: 20px; border: 1px solid #2a2a4a;
    }
    .results-section > h2 { margin-top: 0; color: #e94560; font-size: 1.2em; border-bottom: 1px solid #2a2a4a; padding-bottom: 10px; }

    #stats-text { color: #aaa; font-size: 0.9em; margin-bottom: 15px; text-align: center; }

    /* Solution guide styles (matching solution.html) */
    #results-content h2 { color: #e94560; text-align: center; }
    #results-content .info { color: #888; font-size: 14px; text-align: center; }

    .step {
        background: #0f1a3a; border-radius: 8px;
        padding: 15px; margin: 15px 0; border: 1px solid #2a2a4a;
    }
    .step h3 { color: #ccc; margin-top: 0; margin-bottom: 10px; }

    .board {
        display: inline-grid; gap: 0; padding: 0;
        margin: 10px auto; display: grid; justify-content: center;
    }
    .cell { width: 50px; height: 50px; position: relative; line-height: 0; }
    .cell img { width: 50px; height: 50px; display: block; }
    .cell.highlight { outline: 3px solid rgba(255,255,0,0.6); outline-offset: -3px; }
    .cell.click-here { outline: 4px solid #2ecc40; outline-offset: -4px; }

    .shape-preview {
        font-family: monospace; font-size: 14px; line-height: 1.2;
        color: #aaa; margin: 5px 0 10px;
    }

    .solved { color: #2ecc71; font-size: 24px; text-align: center; font-weight: bold; padding: 20px; }
</style>
</head>
<body>
<div class="container">
    <h1>Shapeshifter Solver</h1>
    <div id="status">Loading WASM solver...</div>

    <div class="input-section">
        <label for="puzzle-input">Paste page source (Ctrl+U, Ctrl+A, Ctrl+C)</label>
        <textarea id="puzzle-input" placeholder="Paste Shapeshifter page HTML source here"></textarea>
    </div>

    <div class="btn-row">
        <button id="solve-btn" disabled>Solve</button>
    </div>

    <div class="results-section">
        <h2>Solution</h2>
        <div id="stats-text"></div>
        <div id="results-content"><p style="color:#888">Waiting for input...</p></div>
    </div>
</div>

<script type="module" src="web/solver.js"></script>
</body>
</html>
